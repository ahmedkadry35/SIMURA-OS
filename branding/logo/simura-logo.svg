<?xml version="1.0" encoding="UTF-8"?>
<!--
  SIMURA OS logo.
  Concept: a hexagonal "neural" core (S monogram inside) wrapped by a thin
  cyan halo, conveying AI + structured architecture. Pure SVG — scales
  cleanly to all icon sizes used by the system (16, 22, 24, 32, 48, 64,
  128, 256, 512).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="halo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="50%" stop-color="#00b8ff"/>
      <stop offset="100%" stop-color="#7c4dff"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e2a"/>
      <stop offset="100%" stop-color="#000814"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- soft ambient glow -->
  <circle cx="256" cy="256" r="240" fill="url(#glow)"/>

  <!-- outer halo ring -->
  <polygon points="256,32 462,144 462,368 256,480 50,368 50,144"
           fill="none" stroke="url(#halo)" stroke-width="6"
           stroke-linejoin="round"/>

  <!-- inner hex core -->
  <polygon points="256,80 416,168 416,344 256,432 96,344 96,168"
           fill="url(#core)" stroke="#00e5ff" stroke-width="3"
           stroke-linejoin="round"/>

  <!-- circuit lines -->
  <g stroke="#00e5ff" stroke-width="2" fill="none" opacity="0.65">
    <path d="M 96,256 L 160,256"/>
    <path d="M 416,256 L 352,256"/>
    <path d="M 256,80 L 256,140"/>
    <path d="M 256,432 L 256,372"/>
    <circle cx="160" cy="256" r="4" fill="#00e5ff" stroke="none"/>
    <circle cx="352" cy="256" r="4" fill="#00e5ff" stroke="none"/>
    <circle cx="256" cy="140" r="4" fill="#00e5ff" stroke="none"/>
    <circle cx="256" cy="372" r="4" fill="#00e5ff" stroke="none"/>
  </g>

  <!-- "S" monogram, simplified geometric form -->
  <path d="M 320,180
           L 220,180
           Q 188,180 188,212
           Q 188,244 220,244
           L 292,244
           Q 324,244 324,276
           Q 324,308 292,308
           L 192,308"
        fill="none" stroke="url(#halo)" stroke-width="22"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- subtle inner pulse dot -->
  <circle cx="256" cy="256" r="6" fill="#00e5ff"/>
</svg>
