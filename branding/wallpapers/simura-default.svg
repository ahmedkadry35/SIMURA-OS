<?xml version="1.0" encoding="UTF-8"?>
<!--
  SIMURA OS default wallpaper.
  3840x2160 (4K) so it scales down cleanly to lower-DPI displays.
  Aesthetic: deep purple/violet night sky, distant glowing crescent planet on
  the right, layered mountain silhouettes (cyan-violet rim-light) descending
  to a reflective valley. Designed to read well behind translucent panels.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3840 2160" width="3840" height="2160">
  <defs>
    <!-- night sky gradient: black-navy at top, deep violet mid, dark indigo bottom -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#06031a"/>
      <stop offset="35%"  stop-color="#10094a"/>
      <stop offset="70%"  stop-color="#1a0a3f"/>
      <stop offset="100%" stop-color="#0a0420"/>
    </linearGradient>

    <!-- planet body: deep violet sphere with subtle banding -->
    <radialGradient id="planetBody" cx="0.42" cy="0.42" r="0.65">
      <stop offset="0%"   stop-color="#8a4ffd"/>
      <stop offset="55%"  stop-color="#5a2fd1"/>
      <stop offset="100%" stop-color="#1d0a4a"/>
    </radialGradient>

    <!-- planet halo -->
    <radialGradient id="planetHalo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#b07cff" stop-opacity="0.55"/>
      <stop offset="40%"  stop-color="#7c4dff" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#7c4dff" stop-opacity="0"/>
    </radialGradient>

    <!-- soft horizon glow on the right -->
    <radialGradient id="horizonGlow" cx="0.78" cy="0.55" r="0.55">
      <stop offset="0%"   stop-color="#c39bff" stop-opacity="0.30"/>
      <stop offset="60%"  stop-color="#7c4dff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7c4dff" stop-opacity="0"/>
    </radialGradient>

    <!-- mountain rim-light gradients -->
    <linearGradient id="rimFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#7c4dff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#1c0c4a" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="rimMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#a26bff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#170730" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="rimNear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#d6a8ff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0c041a" stop-opacity="1"/>
    </linearGradient>

    <!-- reflection ground -->
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#11062a"/>
      <stop offset="60%" stop-color="#06021a"/>
      <stop offset="100%" stop-color="#020108"/>
    </linearGradient>

    <!-- valley fog -->
    <linearGradient id="fog" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#5a2fd1" stop-opacity="0"/>
      <stop offset="50%" stop-color="#5a2fd1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#5a2fd1" stop-opacity="0"/>
    </linearGradient>

    <!-- subtle stars pattern -->
    <pattern id="starsFine" x="0" y="0" width="240" height="240" patternUnits="userSpaceOnUse">
      <circle cx="35"  cy="60"  r="0.7" fill="#e6d6ff" fill-opacity="0.6"/>
      <circle cx="180" cy="40"  r="0.5" fill="#cdb4ff" fill-opacity="0.5"/>
      <circle cx="120" cy="170" r="0.9" fill="#ffffff" fill-opacity="0.7"/>
      <circle cx="210" cy="200" r="0.5" fill="#a78bff" fill-opacity="0.45"/>
    </pattern>
    <pattern id="starsBig" x="0" y="0" width="540" height="540" patternUnits="userSpaceOnUse">
      <circle cx="80"  cy="120" r="1.4" fill="#ffffff" fill-opacity="0.9"/>
      <circle cx="380" cy="90"  r="1.1" fill="#e1d3ff" fill-opacity="0.85"/>
      <circle cx="450" cy="430" r="1.3" fill="#ffffff" fill-opacity="0.85"/>
      <circle cx="160" cy="380" r="1.0" fill="#cdb4ff" fill-opacity="0.8"/>
    </pattern>
  </defs>

  <!-- sky background -->
  <rect width="3840" height="2160" fill="url(#sky)"/>
  <rect width="3840" height="2160" fill="url(#starsFine)"/>
  <rect width="3840" height="2160" fill="url(#starsBig)"/>

  <!-- right-side ambient horizon glow behind the planet -->
  <rect width="3840" height="2160" fill="url(#horizonGlow)"/>

  <!-- crescent planet (right side) -->
  <g transform="translate(2950, 700)">
    <!-- halo -->
    <circle cx="0" cy="0" r="780" fill="url(#planetHalo)"/>
    <!-- planet body -->
    <circle cx="0" cy="0" r="520" fill="url(#planetBody)"/>
    <!-- shadow side (offset darker disc) creates the crescent look -->
    <circle cx="-160" cy="-40" r="540" fill="#06031a" opacity="0.96"/>
    <!-- inner subtle bands -->
    <ellipse cx="40" cy="-40" rx="380" ry="60"
             fill="#a26bff" fill-opacity="0.06"/>
    <ellipse cx="40" cy="60"  rx="420" ry="40"
             fill="#7c4dff" fill-opacity="0.08"/>
  </g>

  <!-- distant mountain layer (far) -->
  <path d="M 0,1500
           L 240,1370 L 460,1430 L 680,1290 L 920,1380 L 1180,1280
           L 1440,1370 L 1700,1300 L 1980,1390 L 2240,1280 L 2500,1370
           L 2780,1310 L 3040,1410 L 3300,1340 L 3580,1430 L 3840,1380
           L 3840,2160 L 0,2160 Z"
        fill="url(#rimFar)" opacity="0.55"/>

  <!-- mid mountain layer -->
  <path d="M 0,1740
           L 220,1580 L 460,1690 L 700,1520 L 980,1660 L 1240,1540
           L 1520,1670 L 1800,1530 L 2080,1670 L 2360,1530 L 2660,1660
           L 2940,1530 L 3220,1660 L 3500,1560 L 3760,1650 L 3840,1620
           L 3840,2160 L 0,2160 Z"
        fill="url(#rimMid)" opacity="0.85"/>

  <!-- near mountain layer (the prominent purple peaks) -->
  <path d="M 0,1980
           L 180,1800 L 380,1920 L 620,1700 L 880,1900 L 1140,1740
           L 1420,1900 L 1700,1720 L 1980,1900 L 2280,1720 L 2580,1900
           L 2880,1740 L 3180,1900 L 3460,1760 L 3700,1880 L 3840,1820
           L 3840,2160 L 0,2160 Z"
        fill="url(#rimNear)"/>

  <!-- valley fog band that sits over the mountains' base -->
  <rect x="0" y="1700" width="3840" height="380" fill="url(#fog)" opacity="0.7"/>

  <!-- reflective ground / shore in the foreground -->
  <rect x="0" y="2050" width="3840" height="110" fill="url(#ground)"/>
</svg>
