name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint + tests (Python assistant)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install assistant + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ./ai-assistant
          pip install pytest ruff

      - name: Ruff (lint, no autofix)
        working-directory: ai-assistant
        run: |
          ruff check src/ tests/ \
            --select=E,F,W,I,B,UP \
            --ignore=E501

      - name: pytest
        working-directory: ai-assistant
        run: pytest -v --tb=short

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          shopt -s globstar nullglob
          # shell scripts we ship inside the airootfs OR in scripts/
          files=(
            scripts/*.sh
            archiso/airootfs/usr/local/bin/*
          )
          for f in "${files[@]}"; do
              [[ -f "$f" ]] || continue
              if head -1 "$f" | grep -qE '^#!.*(bash|sh)\b'; then
                  echo "==> shellcheck $f"
                  shellcheck -e SC1091,SC2034 "$f" || exit 1
              fi
          done

  validate-archiso:
    name: Validate archiso profile structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sanity-check profile layout
        run: |
          set -euo pipefail
          fail=0
          for f in archiso/profiledef.sh archiso/pacman.conf archiso/packages.x86_64; do
              if [[ ! -f "$f" ]]; then
                  echo "::error file=$f::missing required archiso profile file"
                  fail=1
              fi
          done
          # bootloader dirs
          for d in archiso/syslinux archiso/efiboot/loader archiso/grub; do
              if [[ ! -d "$d" ]]; then
                  echo "::error::missing required bootloader dir $d"
                  fail=1
              fi
          done
          # at least one packages line
          n=$(grep -cv '^\s*\(#\|$\)' archiso/packages.x86_64)
          echo "packages.x86_64 entries: $n"
          if (( n < 50 )); then
              echo "::warning::packages.x86_64 looks suspiciously short"
          fi
          # /etc/os-release
          grep -q '^NAME="SIMURA OS"' archiso/airootfs/etc/os-release \
              || { echo "::error::os-release branding mismatch"; fail=1; }
          exit "$fail"

  branding-render:
    name: Render branding PNGs (sanity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install rsvg-convert
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin
      - name: Render
        run: ./scripts/render-branding.sh
      - name: Upload rendered branding (debug aid)
        uses: actions/upload-artifact@v4
        with:
          name: branding-rendered
          # the output dir is .rendered/ (dotfile), so the artifact action
          # needs include-hidden-files: true to actually upload it.
          path: branding/.rendered/
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 14

  build-iso:
    name: Build ISO (Arch container)
    runs-on: ubuntu-latest
    needs: [lint-and-test, shellcheck, validate-archiso]
    # Only run on push to main or via manual workflow_dispatch / release tag.
    # Pull request runs skip the ISO build (which is slow + bandwidth-heavy)
    # but get full lint + tests above.
    if: ${{ github.event_name != 'pull_request' }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
                       /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h

      - name: Build ISO via build.sh (Docker Arch container)
        run: ./scripts/build.sh

      - name: List output
        run: ls -lh out/

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: simura-iso
          path: |
            out/*.iso
            out/*.sha256
          retention-days: 30
          if-no-files-found: error
