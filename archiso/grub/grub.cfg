# SIMURA OS — GRUB config for UEFI boot of the live ISO.
#
# See https://wiki.archlinux.org/title/Archiso for archiso integration.

if loadfont "${prefix}/fonts/unicode.pf2" ; then
    set gfxmode="auto"
    insmod all_video
    insmod gfxterm
    terminal_input console
    terminal_output gfxterm
fi

# Use a SIMURA-themed splash background if present.
if background_image "${prefix}/themes/simura/background.png"; then
    true
fi

set default="0"
set timeout=5
set timeout_style=menu

# Minor branding — terminal banner.
clear
echo "  ____ ___ __  __ _   _ ____      _      ___  ____  "
echo " / ___|_ _|  \\/  | | | |  _ \\    / \\    / _ \\/ ___| "
echo " \\___ \\| || |\\/| | | | | |_) |  / _ \\  | | | \\___ \\ "
echo "  ___) | || |  | | |_| |  _ <  / ___ \\ | |_| |___) |"
echo " |____/___|_|  |_|\\___/|_| \\_\\/_/   \\_\\ \\___/|____/ "
echo
echo "                  SIMURA OS Live"
echo

menuentry "Boot SIMURA OS (x86_64, UEFI)" --class arch --class gnu-linux --class gnu --class os --id 'archlinux' {
    set gfxpayload=keep
    search --no-floppy --set=root --label %ARCHISO_LABEL%
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% quiet splash loglevel=3 rd.systemd.show_status=auto rd.udev.log_priority=3
    initrd /%INSTALL_DIR%/boot/intel-ucode.img /%INSTALL_DIR%/boot/amd-ucode.img /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
}

menuentry "Boot SIMURA OS (verbose, for debugging)" --class arch --class gnu-linux --class gnu --class os --id 'archlinux-verbose' {
    set gfxpayload=keep
    search --no-floppy --set=root --label %ARCHISO_LABEL%
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL%
    initrd /%INSTALL_DIR%/boot/intel-ucode.img /%INSTALL_DIR%/boot/amd-ucode.img /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
}

menuentry "UEFI Shell" {
    insmod chain
    search --no-floppy --set=root --label %ARCHISO_LABEL%
    chainloader /shellx64.efi
}

menuentry "UEFI Firmware Settings" --id 'uefi-firmware' {
    fwsetup
}

menuentry "System Reboot" --class restart {
    echo "System rebooting..."
    reboot
}

menuentry "System Shutdown" --class shutdown {
    echo "System shutting down..."
    halt
}
