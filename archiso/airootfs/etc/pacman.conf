# SIMURA OS — /etc/pacman.conf for the LIVE / INSTALLED system.
# Inherits the standard Arch repository layout and adds the SIMURA repo
# (currently a placeholder; flatpak handles app distribution for now).

[options]
HoldPkg     = pacman glibc
Architecture = auto
CheckSpace
Color
ILoveCandy
ParallelDownloads = 5
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist
