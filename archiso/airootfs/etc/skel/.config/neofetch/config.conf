# SIMURA OS — neofetch config. Forces the SIMURA ASCII logo + cyan accent
# colors regardless of the detected distro.

print_info() {
    info title
    info underline
    info "OS"          distro
    info "Host"        model
    info "Kernel"      kernel
    info "Uptime"      uptime
    info "Packages"    packages
    info "Shell"       shell
    info "Resolution"  resolution
    info "DE"          de
    info "WM"          wm
    info "WM Theme"    wm_theme
    info "Theme"       theme
    info "Icons"       icons
    info "Terminal"    term
    info "Terminal Font" term_font
    info "CPU"         cpu
    info "GPU"         gpu
    info "Memory"      memory
    info cols
}

distro_shorthand="off"
os_arch="on"
uptime_shorthand="tiny"
memory_percent="on"
package_managers="on"
cpu_brand="on"
cpu_speed="on"
cpu_cores="logical"
refresh_rate="on"
gpu_brand="on"
de_version="on"
disk_show=('/')
disk_subtitle="mount"

ascii_distro="auto"
ascii_colors=(6 4 5 7 6 6)
ascii_bold="on"
image_backend="ascii"
image_source="auto"

# When neofetch loads /etc/os-release with ID=simura, it falls back to
# generic "Linux" ASCII unless we override below. Force the simura logo
# to be read from /usr/share/simura/neofetch-logo.txt.
ascii_distro_x="custom"
ascii_logo_file="/usr/share/simura/neofetch-logo.txt"
