# SIMURA OS — default Starship prompt configuration.
# Cyan/blue accents that match the SIMURA brand palette.

format = """
[╭─](bold cyan)$username[@](bold cyan)$hostname[ ](fg:cyan)$directory$git_branch$git_status$cmd_duration
[╰─](bold cyan)$character """

add_newline = false

[username]
style_user = "bold cyan"
style_root = "bold red"
format = "[$user]($style)"
disabled = false
show_always = true

[hostname]
ssh_only = false
format = "[$hostname](bold blue)"
disabled = false

[directory]
style = "bold blue"
format = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 4
truncate_to_repo = true

[git_branch]
symbol = " "
format = "[$symbol$branch]($style) "
style = "bold magenta"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style)) '
style = "bold yellow"

[cmd_duration]
min_time = 1000
format = "[took $duration](yellow) "

[character]
success_symbol = "[❯](bold cyan)"
error_symbol   = "[❯](bold red)"
