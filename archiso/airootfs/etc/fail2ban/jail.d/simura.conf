# SIMURA OS — fail2ban jails enabled by default.
# Bans IPs that fail authentication 5+ times in 10 minutes for 1 hour.

[DEFAULT]
bantime  = 1h
findtime = 10m
maxretry = 5
backend  = systemd

[sshd]
enabled = true
port    = ssh
logpath = %(sshd_log)s
backend = systemd

[ssh-aggressive]
enabled  = false
filter   = sshd
maxretry = 2
findtime = 5m
bantime  = 24h
