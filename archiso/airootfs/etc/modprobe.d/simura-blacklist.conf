# SIMURA OS — blacklist legacy / rarely-used kernel modules.
# Reduces kernel attack surface and slightly improves boot time.
# Each line is a module name; comment with "#".

# Old / deprecated network protocols
blacklist dccp
blacklist sctp
blacklist rds
blacklist tipc

# Filesystems we don't expect to mount on a modern desktop.
# squashfs and overlay are intentionally NOT blacklisted — they are
# required by the archiso live environment to mount /run/archiso/airootfs
# from airootfs.sfs. The installed system retains both modules so users can
# mount snap packages, AppImages, etc.
blacklist cramfs
blacklist freevxfs
blacklist jffs2
blacklist hfs
blacklist hfsplus

# Bluetooth firmware module that triggers on hardware that's already covered
# by the modern bluez stack — kept for reference, leave loaded by default.
# blacklist bnep
