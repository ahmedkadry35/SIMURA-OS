# SIMURA OS — kernel tunables for desktop responsiveness + sane network/security
# defaults. Each value is documented; users wanting different tradeoffs can
# override with a higher-numbered file in /etc/sysctl.d/.

# ===== Memory / VM ==========================================================
# With zram providing ~50% memory amplification, a low swappiness + high cache
# pressure keeps the system snappy without thrashing.
vm.swappiness                 = 10
vm.vfs_cache_pressure         = 50
vm.dirty_background_ratio     = 5
vm.dirty_ratio                = 10
# Prefer keeping at least 256 MB free for atomic allocations.
vm.min_free_kbytes            = 262144
# Allow processes to use all available memory before invoking OOM killer.
vm.overcommit_memory          = 1

# ===== Filesystem ===========================================================
fs.inotify.max_user_watches   = 524288
fs.file-max                   = 2097152

# ===== Network — performance ===============================================
net.core.default_qdisc        = cake
net.ipv4.tcp_congestion_control = bbr
net.core.rmem_max             = 268435456
net.core.wmem_max             = 268435456
net.ipv4.tcp_rmem             = 4096 87380 268435456
net.ipv4.tcp_wmem             = 4096 65536 268435456
net.ipv4.tcp_fastopen         = 3

# ===== Network — security ==================================================
# Reverse-path filtering, RFC 1337 / TIME_WAIT assassination protection,
# SYN-flood protection, ICMP redirect / source-route hardening.
net.ipv4.conf.all.rp_filter           = 1
net.ipv4.conf.default.rp_filter       = 1
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv4.conf.all.accept_redirects    = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.send_redirects      = 0
net.ipv4.conf.default.send_redirects  = 0
net.ipv4.conf.all.log_martians        = 1
net.ipv4.tcp_syncookies               = 1
net.ipv4.tcp_rfc1337                  = 1
net.ipv4.icmp_echo_ignore_broadcasts  = 1
net.ipv4.icmp_ignore_bogus_error_responses = 1
net.ipv6.conf.all.accept_redirects    = 0
net.ipv6.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

# ===== Kernel hardening ====================================================
kernel.kptr_restrict          = 2
kernel.dmesg_restrict         = 1
kernel.printk                 = 3 3 3 3
kernel.unprivileged_bpf_disabled = 1
kernel.kexec_load_disabled    = 1
kernel.yama.ptrace_scope      = 1
# Disallow user namespaces for unprivileged users (set to 1 if you rely on
# rootless containers; default here trades container capability for
# attack surface reduction).
kernel.unprivileged_userns_clone = 1
