# SIMURA OS — zram swap.
# zram is a kernel module that creates a compressed RAM-backed swap device.
# Effectively trades a tiny amount of CPU for *significant* extra effective
# memory before the system has to swap to disk. zstd is the modern default.

[zram0]
# Half of installed memory, capped at 8 GiB.
zram-size = min(ram / 2, 8192)
compression-algorithm = zstd
swap-priority = 100
fs-type = swap
