LABEL simura
TEXT HELP
Boot the SIMURA OS live system. The kernel runs on real hardware/VM and the
included Calamares installer can write SIMURA OS to disk.
ENDTEXT
MENU LABEL Boot SIMURA OS (x86_64, BIOS)
LINUX boot/x86_64/vmlinuz-linux
INITRD boot/x86_64/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% quiet splash loglevel=3 rd.systemd.show_status=auto rd.udev.log_priority=3 cow_spacesize=2G
SYSAPPEND 3
