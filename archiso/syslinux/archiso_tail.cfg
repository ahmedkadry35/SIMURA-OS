LABEL existing
  TEXT HELP
  Boot an existing operating system from a local disk.
  ENDTEXT
  MENU LABEL Boot existing OS
  COM32 chain.c32
  APPEND hd0 0

LABEL reboot
  TEXT HELP
  Reboot computer.
  ENDTEXT
  MENU LABEL Reboot
  COM32 reboot.c32

LABEL poweroff
  TEXT HELP
  Power off computer.
  ENDTEXT
  MENU LABEL Power Off
  COM32 poweroff.c32
