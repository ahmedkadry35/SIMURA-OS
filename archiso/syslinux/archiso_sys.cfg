SERIAL 0 115200
UI vesamenu.c32
MENU TITLE SIMURA OS
MENU BACKGROUND boot/syslinux/splash.png
MENU CLEAR
MENU TABMSG Press Tab to edit options, Enter to boot
MENU NOTABMSG (Tab key disabled)

MENU WIDTH 78
MENU MARGIN 4
MENU ROWS 5
MENU VSHIFT 10
MENU TABMSGROW 14
MENU CMDLINEROW 14
MENU HELPMSGROW 16
MENU HELPMSGENDROW 29

# Cyan-on-black palette tuned for the SIMURA brand.
MENU COLOR border       30;44   #40ffffff #a0000000 std
MENU COLOR title        1;36;44 #c000ffff #00000000 std
MENU COLOR sel          7;37;40 #e0ffffff #20ffffff all
MENU COLOR unsel        37;44   #50ffffff #a0000000 std
MENU COLOR help         37;40   #c0ffffff #00000000 std
MENU COLOR timeout_msg  37;40   #80ffffff #00000000 std
MENU COLOR timeout      1;37;40 #c0ffffff #00000000 std
MENU COLOR msg07        37;40   #90ffffff #a0000000 std
MENU COLOR tabmsg       31;40   #30ffffff #00000000 std

INCLUDE boot/syslinux/archiso_sys-linux.cfg

LABEL existing
  TEXT HELP
  Boot an existing operating system. Read the help entry "Boot loader" in
  for an example.
  ENDTEXT
  MENU LABEL Boot existing OS
  COM32 chain.c32
  APPEND hd0 0

# Memtest is only available for x86_64 BIOS
LABEL memtest
  MENU LABEL Run Memtest86+ (RAM test)
  LINUX boot/memtest

LABEL hdt
  MENU LABEL Hardware Information (HDT)
  COM32 hdt.c32

LABEL reboot
  TEXT HELP
  Reboot computer.
  ENDTEXT
  MENU LABEL Reboot
  COM32 reboot.c32

LABEL poweroff
  TEXT HELP
  Power off computer.
  ENDTEXT
  MENU LABEL Power Off
  COM32 poweroff.c32
