LABEL simura
TEXT HELP
Boot the SIMURA OS live system from PXE / network. Useful for diskless or
remote installation scenarios.
ENDTEXT
MENU LABEL Boot SIMURA OS (x86_64, PXE)
LINUX boot/x86_64/vmlinuz-linux
INITRD boot/x86_64/initramfs-linux.img
APPEND archiso_nfs_srv=${pxeserver}:/run/archiso/bootmnt archisobasedir=%INSTALL_DIR% checksum ip=dhcp quiet splash loglevel=3
SYSAPPEND 3
