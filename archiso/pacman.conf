#
# /etc/pacman.conf — pacman configuration used while BUILDING the SIMURA ISO.
# This is the host pacman.conf passed to mkarchiso; the live system's own
# pacman.conf lives at airootfs/etc/pacman.conf.
#

[options]
HoldPkg     = pacman glibc
Architecture = auto
CheckSpace
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional
ParallelDownloads = 5

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist
