# SIMURA OS — Calamares shellprocess module.
# Runs after package installation to apply final SIMURA-specific touches:
#   1. Set zsh as the default shell for the freshly-created user.
#   2. Enable simura-firstboot.service on the installed system.
#   3. Enable ollama, ufw, fail2ban, NetworkManager, sddm, simura-performance.
#   4. Drop the live "simura" user from the installed system.
#   5. Refresh font / icon caches.

dontChroot: false
timeout:    600

script:
  - command: "chsh -s /bin/zsh @@username@@"
    timeout: 60
  - command: "systemctl enable simura-firstboot.service"
  - command: "systemctl enable simura-performance.service"
  - command: "systemctl enable NetworkManager.service"
  - command: "systemctl enable bluetooth.service"
  - command: "systemctl enable cups.service"
  - command: "systemctl enable sddm.service"
  - command: "systemctl enable fstrim.timer"
  - command: "systemctl enable systemd-timesyncd.service"
  - command: "systemctl enable earlyoom.service"
  - command: "systemctl enable irqbalance.service"
  - command: "systemctl enable thermald.service || true"
  - command: "systemctl enable apparmor.service || true"
  - command: "systemctl enable auditd.service || true"
  - command: "userdel -r simura || true"
  - command: "fc-cache -f"
  - command: "gtk-update-icon-cache -fq /usr/share/icons/hicolor || true"
  - command: "plymouth-set-default-theme -R simura || true"
  - command: "flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo || true"
